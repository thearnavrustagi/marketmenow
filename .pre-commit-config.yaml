repos:
  - repo: local
    hooks:
      - id: run-tests
        name: Run test suite
        entry: uv run --extra dev pytest --tb=short -q
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check src/ tests/
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: ruff-format
        name: Ruff format check
        entry: uv run ruff format --check src/ tests/
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
