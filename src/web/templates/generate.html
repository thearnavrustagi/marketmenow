{% extends "base.html" %}
{% block title %}Generate Content - MarketMeNow{% endblock %}
{% block content %}
<div class="flex flex-wrap items-center justify-between gap-4 mb-8">
  <h1 class="text-2xl font-semibold text-white">Generate Content</h1>
  <div class="flex flex-wrap items-center gap-3">
    <button class="flex items-center justify-center px-5 py-2 rounded-lg text-sm font-semibold bg-white text-black hover:bg-zinc-200 transition-colors disabled:opacity-50"
            hx-post="/generate/all"
            hx-target="#generation-result"
            hx-swap="afterbegin"
            hx-disabled-elt="this"
            hx-indicator="#batch-spinner">
      Generate &amp; Publish All
    </button>
    <span id="batch-spinner" class="htmx-indicator w-5 h-5 border-2 border-zinc-700 border-t-white rounded-full animate-spin hidden"></span>
  </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-[400px_1fr] gap-8 items-start">
  <form id="generate-form"
        hx-post="/generate"
        hx-target="#generation-result"
        hx-swap="afterbegin"
        class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 flex flex-col gap-5">

    <div class="flex flex-col gap-1.5">
      <label for="platform" class="text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">Platform</label>
      <select name="platform" id="platform" required onchange="updateCommands()" class="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:border-white focus:ring-1 focus:ring-white/20 transition-colors outline-none">
        <option value="">Select platform...</option>
        {% for platform_name, commands in platforms.items() %}
          <option value="{{ platform_name }}">{{ platform_name | capitalize }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="flex flex-col gap-1.5">
      <label for="command_type" class="text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">Content Type</label>
      <select name="command_type" id="command_type" required onchange="updateParams()" class="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:border-white focus:ring-1 focus:ring-white/20 transition-colors outline-none">
        <option value="">Select content type...</option>
      </select>
    </div>

    <div id="dynamic-params" class="flex flex-col gap-5"></div>

    <button type="submit" class="w-full flex items-center justify-center px-5 py-2.5 mt-2 rounded-lg text-sm font-semibold bg-white text-black hover:bg-zinc-200 transition-colors">
      Generate
    </button>
  </form>

  <div id="generation-result" class="flex flex-col gap-4"></div>
</div>

<script>
var platformData = {{ platforms | tojson }};

function updateCommands() {
  var platform = document.getElementById('platform').value;
  var cmdSelect = document.getElementById('command_type');
  cmdSelect.innerHTML = '<option value="">Select content type...</option>';
  document.getElementById('dynamic-params').innerHTML = '';

  if (!platform || !platformData[platform]) return;

  for (var key in platformData[platform]) {
    var spec = platformData[platform][key];
    var opt = document.createElement('option');
    opt.value = key;
    opt.textContent = spec.label;
    cmdSelect.appendChild(opt);
  }
}

function updateParams() {
  var platform = document.getElementById('platform').value;
  var cmdType = document.getElementById('command_type').value;
  var container = document.getElementById('dynamic-params');
  container.innerHTML = '';

  if (!platform || !cmdType) return;
  var spec = platformData[platform] && platformData[platform][cmdType];
  if (!spec || !spec.params) return;

  for (var i = 0; i < spec.params.length; i++) {
    var param = spec.params[i];
    var div = document.createElement('div');
    div.className = 'flex flex-col gap-1.5';

    var label = document.createElement('label');
    label.setAttribute('for', param.name);
    label.className = 'text-[10px] font-semibold text-zinc-500 uppercase tracking-wider';
    label.textContent = param.name.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    div.appendChild(label);

    var input;
    if (param.type === 'textarea') {
      input = document.createElement('textarea');
      input.rows = 3;
    } else if (param.type === 'select') {
      input = document.createElement('select');
      var emptyOpt = document.createElement('option');
      emptyOpt.value = '';
      emptyOpt.textContent = 'Default';
      input.appendChild(emptyOpt);
      for (var j = 0; j < (param.options || []).length; j++) {
        var opt = document.createElement('option');
        opt.value = param.options[j];
        opt.textContent = param.options[j];
        input.appendChild(opt);
      }
    } else {
      input = document.createElement('input');
      input.type = param.type === 'number' ? 'number' : 'text';
    }

    input.name = param.name;
    input.id = param.name;
    input.className = 'w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:border-white focus:ring-1 focus:ring-white/20 transition-colors outline-none';
    if (param.required) input.required = true;
    if (param.help) input.placeholder = param.help;
    div.appendChild(input);

    container.appendChild(div);
  }
}
</script>
{% endblock %}
