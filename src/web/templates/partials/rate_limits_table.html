<div class="overflow-x-auto rounded-xl border border-zinc-800 bg-zinc-900">
  <table class="w-full text-left border-collapse">
    <thead>
      <tr>
        <th class="border-b border-zinc-800 py-3 px-4 text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">Platform</th>
        <th class="border-b border-zinc-800 py-3 px-4 text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">Max / Hour</th>
        <th class="border-b border-zinc-800 py-3 px-4 text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">Max / Day</th>
        <th class="border-b border-zinc-800 py-3 px-4 text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">Min Interval (s)</th>
        <th class="border-b border-zinc-800 py-3 px-4 text-[10px] font-semibold text-zinc-500 uppercase tracking-wider">Queued</th>
        <th class="border-b border-zinc-800 py-3 px-4 text-[10px] font-semibold text-zinc-500 uppercase tracking-wider"></th>
      </tr>
    </thead>
    <tbody class="divide-y divide-zinc-800/50">
      {% for rl in rate_limits %}
      <tr class="hover:bg-zinc-800/30 transition-colors">
        <form hx-put="/queues/rate-limit"
              hx-target="#rate-limits-table"
              hx-swap="innerHTML">
          <td class="py-3 px-4">
            <span class="px-2.5 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wider bg-zinc-800 text-zinc-400">{{ rl.platform }}</span>
            <input type="hidden" name="platform" value="{{ rl.platform }}">
          </td>
          <td class="py-3 px-4"><input type="number" name="max_per_hour" value="{{ rl.max_per_hour }}" min="1" class="w-20 bg-black border border-zinc-800 rounded-md px-2 py-1 text-sm text-zinc-100 focus:border-white focus:ring-1 focus:ring-white/20 outline-none"></td>
          <td class="py-3 px-4"><input type="number" name="max_per_day" value="{{ rl.max_per_day }}" min="1" class="w-20 bg-black border border-zinc-800 rounded-md px-2 py-1 text-sm text-zinc-100 focus:border-white focus:ring-1 focus:ring-white/20 outline-none"></td>
          <td class="py-3 px-4"><input type="number" name="min_interval_seconds" value="{{ rl.min_interval_seconds }}" min="0" class="w-20 bg-black border border-zinc-800 rounded-md px-2 py-1 text-sm text-zinc-100 focus:border-white focus:ring-1 focus:ring-white/20 outline-none"></td>
          <td class="py-3 px-4 text-sm text-zinc-300">{{ queue_counts.get(rl.platform, 0) }}</td>
          <td class="py-3 px-4"><button type="submit" class="px-3 py-1.5 rounded-md text-xs font-semibold bg-zinc-800 hover:bg-zinc-700 text-zinc-100 transition-colors">Save</button></td>
        </form>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
