id: can_ai_grade_this
name: "Can Our AI Grade This"
aspect_ratio: "9:16"
fps: 30
composition_id: ReelFromTemplate

default_visual:
  brand_color: "#4A8DF8"
  brand_name: "Gradeasy"
  brand_suffix: ".ai"
  font_family: "system-ui, sans-serif"
  panel_background: "#0A0A0A"
  frame_background: "#E0E0E0"

caption_template: |
  Can our AI grade this?

  {{ result_comment }}

  Try Gradeasy now at gradeasy.ai

hashtags:
  - AIGrading
  - EdTech
  - Gradeasy
  - AI
  - SchoolHacks

hook_lines:
  - "can you grade my assignment twin?"
  - "bro rate my homework fr fr"
  - "someone grade this rn"
  - "yo can someone grade this for me"
  - "grade my paper bestie"
  - "be honest how bad is this"
  - "am i cooked or nah"
  - "tell me i passed please"
  - "ai grade my homework pls"
  - "can your ai even handle this"
  - "grade this or im dropping out"
  - "my teacher hates me just grade it"

worksheet:
  question_types:
    - type: labeling
      description: "Label parts of a diagram"
      needs_image_prompt: true
    - type: match_the_following
      description: "Match items from column A to column B"
    - type: fill_in_the_blanks
      description: "Fill in missing words in sentences"
    - type: multiple_choice
      description: "Choose the correct answer from 4 options"
    - type: short_answer
      description: "Brief 1-2 sentence written response"
    - type: true_false
      description: "Mark statements as true or false"
    - type: word_problem
      description: "Solve a math or science word problem"
    - type: long_essay
      description: "Write a long-form paragraph essay response"
  subjects:
    - Math
    - Science
    - History
    - English
    - Geography
    - Biology
    - Physics
    - Chemistry
  num_questions: [1, 3]
  fill_prompt: >-
    Fill in this worksheet as a dumb kid would. Write hilariously wrong answers
    in messy, bad handwriting. Use brainrot humor — stuff like '67', 'skibidi',
    'rizz', 'sigma', 'fanum tax', 'ohio', 'gyatt'. Make it look like a real
    student filled it in poorly. The answers should be confidently wrong and
    funny ragebait. Write with a pen in blue or black ink, messy kid handwriting.
    Don't leave any question blank — every answer should be wrong and hilarious.

pipeline:
  steps:
    - id: generate_worksheet
      type: worksheet
      inputs: {}
      output_var: worksheet_result
      output_fields:
        - worksheet_image
        - labeling_image_prompt
        - worksheet_subject
        - worksheet_question_types

    - id: fill_worksheet
      type: fill_worksheet
      inputs:
        worksheet_image: "{{ worksheet_image }}"
      output_var: assignment_image

    - id: generate_rubric
      type: rubric
      inputs:
        assignment_image: "{{ assignment_image }}"
      output_var: rubric_items

    - id: grade_assignment
      type: grading
      inputs:
        assignment_image: "{{ assignment_image }}"
        rubric_items: "{{ rubric_items }}"
      output_var: grading_result

    - id: write_script
      type: llm
      inputs:
        prompt: script_generation
        model: gemini-2.5-flash
        temperature: 0.8
        context:
          template_name: "{{ name }}"
          points_awarded: "{{ grading_result.points_awarded }}"
          max_points: "{{ grading_result.max_points }}"
          feedback: "{{ grading_result.feedback }}"
          rubric_eval_text: "{{ grading_result.rubric_evaluations }}"
      output_fields:
        - reaction_text
        - roast_text
        - gradeasy_response
        - rubric_narration
        - grading_narration
        - result_comment

variables:
  - assignment_image
  - worksheet_image
  - worksheet_subject
  - worksheet_question_types
  - labeling_image_prompt
  - reaction_text
  - roast_text
  - gradeasy_response
  - reaction_image
  - rubric_items
  - grading_result
  - rubric_narration
  - grading_narration
  - result_comment
  - gradeasy_voice_id
  - kid_voice_id

beats:
  - id: hook_text
    scene: TikTokCommentScene
    entry_transition:
      type: fade
      duration_frames: 8
    audio:
      type: tts
      text: "{{ comment_text }}"
      voice: "{{ kid_voice_id }}"
    duration: from_audio
    pad_seconds: 0.1
    visual:
      username: "{{ comment_username }}"
      avatar: "{{ comment_avatar }}"
      comment_text: "{{ comment_text }}"
      show_image: false

  - id: hook_image
    scene: TikTokCommentScene
    entry_transition:
      type: scale
      duration_frames: 6
    audio:
      type: sfx
      file: ""
    duration: fixed
    fixed_seconds: 0.8
    visual:
      username: "{{ comment_username }}"
      avatar: "{{ comment_avatar }}"
      comment_text: "{{ comment_text }}"
      comment_image: "{{ assignment_image }}"
      show_image: true

  - id: bruh_reveal
    scene: RevealScene
    entry_transition:
      type: spring
      duration_frames: 10
    audio:
      type: sfx
      file: assets/sfx/bruh.mp3
    duration: fixed
    fixed_seconds: 1.2
    visual:
      image: "{{ assignment_image }}"

  - id: reaction
    scene: FlashRevealScene
    entry_transition:
      type: none
    audio:
      type: sfx
      file: assets/sfx/tinnitus.mp3
    duration: fixed
    fixed_seconds: 2.0
    visual:
      image: "{{ reaction_image }}"
      flash_color: "#ffffff"
      flash_duration: 0.3

  - id: roast
    scene: RoastScene
    entry_transition:
      type: slide
      duration_frames: 10
      direction: up
    audio:
      type: tts
      text: "{{ roast_text }}"
    duration: from_audio
    pad_seconds: 0.3
    visual:
      image: "{{ assignment_image }}"
      text_overlay: "{{ roast_text }}"

  - id: gradeasy_response
    scene: GradeasyResponseScene
    entry_transition:
      type: scale
      duration_frames: 8
    audio:
      type: tts
      text: "{{ gradeasy_response }}"
      voice: "{{ gradeasy_voice_id }}"
    duration: from_audio
    pad_seconds: 0.2
    visual:
      text_overlay: "{{ gradeasy_response }}"

  - id: transition
    scene: TransitionScene
    entry_transition:
      type: slide
      duration_frames: 8
      direction: left
    audio:
      type: sfx
      file: assets/sfx/whoosh.mp3
    duration: from_audio
    pad_seconds: 0.3
    visual:
      image: "{{ assignment_image }}"

  - id: segmentation
    scene: SegmentationScene
    entry_transition:
      type: fade
      duration_frames: 10
    audio:
      type: sfx
      file: ""
    duration: fixed
    fixed_seconds: 2.5
    visual:
      image: "{{ assignment_image }}"
      status_text: "Analyzing assignment"

  - id: rubric_creation
    scene: RubricScene
    entry_transition:
      type: slide
      duration_frames: 10
      direction: up
    audio:
      type: tts
      text: "{{ rubric_narration }}"
      voice: "{{ gradeasy_voice_id }}"
    duration: from_audio
    visual:
      rubric_items: "{{ rubric_items }}"

  - id: grading
    scene: GradingScene
    entry_transition:
      type: fade
      duration_frames: 12
    audio:
      type: tts
      text: "{{ grading_narration }}"
      voice: "{{ gradeasy_voice_id }}"
    duration: from_audio
    visual:
      student_name: "{{ student_name }}"
      rubric_items: "{{ rubric_items }}"
      grading_result: "{{ grading_result }}"
      background_image: "{{ assignment_image }}"

  - id: result
    scene: ResultScene
    entry_transition:
      type: spring
      duration_frames: 12
    exit_transition:
      type: fade
      duration_frames: 15
    audio:
      type: tts
      text: "{{ result_comment }}"
    duration: from_audio
    pad_seconds: 0.5
    visual:
      grade: "{{ grading_result.points_awarded }}/{{ grading_result.max_points }}"
      feedback: "{{ grading_result.feedback }}"
