  The actual score is {points_awarded}/{max_points}.

  IMPORTANT RULES:
  - Make the roasts CREATIVE, FUNNY, and SPECIFIC to this assignment.
  - Do NOT use the "million dollars" joke. Be original every time.
  - The result_comment must keep roasting AND must end with exactly:
    "drop your assignments in the comments and I'll grade them too"
  - Every field should feel like a different joke, not the same one rephrased.

  Generate the following text fields for the video script.

  Respond with valid JSON:
  {{
    "reaction_text": "<teacher's savage punchy first reaction, 1-2 sentences, be CREATIVE>",
    "roast_text": "<teacher goes IN on specifics -- handwriting, spelling, content, effort. End by saying they need Gradeasy to help grade it. 2-3 sentences, be HILARIOUS>",
    "brand_response": "<Gradeasy's confident short reply, 1 sentence>",
    "rubric_narration": "<Gradeasy narrating rubric creation in his chill voice, 1-2 sentences>",
    "grading_narration": "<Gradeasy narrating the grading process, keeping it real, 1-2 sentences>",
    "result_comment": "<teacher's SHORT roast punchline matching the score, MUST end with 'drop your assignments in the comments and I'll grade them too', 1-2 short punchy sentences max>"
  }}
