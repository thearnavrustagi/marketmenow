items:
  - platform: instagram
    command_type: reel
    params:
      template: can_ai_grade_this

  - platform: instagram
    command_type: reel
    params:
      template: reddit_horror_story

  - platform: instagram
    command_type: carousel
    count: 2

  - platform: twitter
    command_type: thread

  - platform: twitter
    command_type: engage

  - platform: twitter
    command_type: outreach
    params:
      profile: campaigns/twitter-outreach.yaml

  - platform: linkedin
    command_type: post

  - platform: facebook
    command_type: post

  - platform: reddit
    command_type: engage

  - platform: youtube
    command_type: short
    count: 2

  - platform: tiktok
    command_type: upload
    count: 2
    params:
      title: "Can AI grade your homework? Try it free at gradeasy.ai"
      hashtags: "AIGrading,EdTech,Gradeasy,TeacherHack,fyp,SchoolHacks,AI,gradeasy"

  - platform: email
    command_type: send
    params:
      template: templates/email/sharegradeasy.html
      file: vault/teachers.csv
