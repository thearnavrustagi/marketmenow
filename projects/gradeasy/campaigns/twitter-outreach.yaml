# Twitter Cold Outreach Campaign Config
# Copy this file, customise it for your ICP, and run:
#   mmn run twitter-outreach --profile campaigns/your-campaign.yaml --dry-run

platform: twitter

product:
  name: "Gradeasy"
  url: "https://gradeasy.ai"
  tagline: "AI-powered grading assistant for K-12 teachers"
  value_prop: "Saves teachers 8-15 hours/week on grading"

ideal_customer:
  description: >
    K-12 teachers who are overwhelmed by grading workload,
    spend evenings/weekends grading, and are open to using
    technology to save time.

  rubric:
    - name: "Role Fit"
      description: >
        Is this person a K-12 teacher, professor, TA, or education professional
        who grades student work (essays, tests, assignments)?
        Bio must say "teacher", "educator", "professor", etc. or posts clearly
        indicate a teaching role. IMMEDIATELY DISQUALIFY anyone involved in
        Pokemon card grading, sports card grading (PSA, BGS, CGC), coin grading,
        collectibles, or any non-education grading context.
      max_points: 5

    - name: "Pain Signal"
      description: >
        Have they expressed frustration about grading student work specifically?
        Mentions of late nights grading papers/essays, piles of student work,
        grading burnout from teaching. Must be about academic grading, not
        card/collectible grading.
      max_points: 3

    - name: "Tech Openness"
      description: >
        Do they use or discuss edtech tools? Mention AI, apps, digital tools
        in an education context? Are they curious about classroom technology?
      max_points: 2

    - name: "Engagement Level"
      description: >
        Are they actively posting (not a dormant account)?
        Do they reply to others, participate in conversations?
      max_points: 2

    - name: "DM Receptiveness"
      description: >
        Follower count sweet spot (100-10K). Do they seem approachable in tone?
      max_points: 1

  min_score: 8
  max_prospects_to_enrich: 50

  bio_blocklist:
    - "pokemon"
    - "PSA"
    - "BGS"
    - "CGC"
    - "card grading"
    - "card grader"
    - "sports card"
    - "coin grading"
    - "coin dealer"
    - "numismatic"
    - "collectibles"
    - "slab"
    - "graded cards"
    - "trading cards"
    - "crypto"
    - "forex"
    - "NFT"
    - "dropship"

  bio_require_any:
    - "teacher"
    - "educator"
    - "teaching"
    - "prof "
    - "professor"
    - "school"
    - "classroom"
    - "students"
    - "grade "
    - "grading"
    - "k-12"
    - "k12"
    - "kindergarten"
    - "elementary"
    - "middle school"
    - "high school"
    - "math teacher"
    - "english teacher"
    - "science teacher"
    - "history teacher"
    - "special ed"
    - "sped"
    - "ELA"
    - "EdTech"
    - "instructional"
    - "principal"
    - "tutor"
    - "homeschool"
    - "TA "

# Discovery vectors — presence = enabled, remove an entry to disable that vector.
# All pain_search queries exclude collectible grading (Pokemon, PSA, BGS, cards, coins).
discovery:
  - type: pain_search
    entries:
      - '"so many papers to grade" -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
      - '(teacher OR teaching) (grading OR "marking papers") (exhausted OR overwhelmed OR "takes forever") -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
      - '"up late grading" (students OR essays OR papers OR assignments) -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
      - '"grading all weekend" (teacher OR school OR class) -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
      - '(teacher OR educator) "grading burnout" -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
      - '"grade essays" OR "grade papers" OR "grading assignments" (tired OR hate OR exhausting) -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
    max_per_entry: 5

  - type: conversation_mining
    entries:
      - "@coolcatteacher"
      - "@cultofpedagogy"
      - "@TeachBetter"
      - "@WeAreTeachers"
      - "@edaborado"
    max_per_entry: 5

  - type: hashtag_scan
    entries:
      - "#teacherlife"
      - "#teacherproblems"
      - "#gradingseason"
      - "#teachertwitter"
      - "#iteachtoo"
    max_per_entry: 5

messaging:
  max_messages: 10
  min_delay_seconds: 120
  max_delay_seconds: 300
  tone: "casual, helpful, peer-to-peer — like a fellow teacher sharing a find, not a salesperson"
  reference_post: true
  pause_every_n: 5
  long_pause_seconds: 600
  max_message_length: 280
