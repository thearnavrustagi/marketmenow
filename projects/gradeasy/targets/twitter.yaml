# Outreach discovery — pain search queries (Twitter search operators)
search_queries:
  - '"so many papers to grade" -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
  - '(teacher OR teaching) (grading OR "marking papers") (exhausted OR overwhelmed OR "takes forever") -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
  - '"up late grading" (students OR essays OR papers OR assignments) -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
  - '"grading all weekend" (teacher OR school OR class) -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
  - '(teacher OR educator) "grading burnout" -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'
  - '"grade essays" OR "grade papers" OR "grading assignments" (tired OR hate OR exhausting) -pokemon -PSA -BGS -cards -coins -is:retweet lang:en'

