services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mmn
      POSTGRES_PASSWORD: mmn
      POSTGRES_DB: marketmenow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmn"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
